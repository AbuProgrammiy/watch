<div class="main">
  <div class="header">
    <h1 class="text">Benefits of MSC’s <br />New Car Shipping Solutions</h1>
    <div class="line"></div>
  </div>
  <div class="features">
    @for (item of features; track $index) {
      <div class="content">
        <img class="icon" [src]="item?.img" alt="icon" />
        <p class="description">{{ item?.text }}</p>
      </div>
      <div class="dots-content">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    }
  </div>
</div>
