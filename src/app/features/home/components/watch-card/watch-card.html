<div class="main" (click)="navigate()">
  <img class="img" [src]="watch()?.imgUrl" alt="soat" />
  <div class="carousel">
    <div class="item">Slide 1</div>
    <div class="item">Slide 2</div>
    <div class="item">Slide 3</div>
  </div>
  <div class="body">
    <h4 class="name">{{ watch()?.name }}</h4>
    <p class="desription">{{ watch()?.description }}</p>
    <p class="price">{{ watch()?.price }}</p>
  </div>
</div>
